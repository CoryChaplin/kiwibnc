<template id="kiwibnc-startup">
    <startup-layout ref="layout" class="kiwibnc-startup">
        <template v-slot:connection>
            <form class="u-form u-form--big kiwibnc-startup-form" @submit.prevent="onSubmit">
                <h2 v-html="greetingText"></h2>
                <div v-if="errorMessage" class="kiwibnc-error">{{ errorMessage }}</div>
                <input-text
                    v-model="username"
                    v-focus
                    :label="$t('username')"
                    :disabled="loading"
                    type="text"
                ></input-text>
                <input-text
                    ref="password"
                    v-model="password"
                    :show-plain-text="true"
                    :label="$t('password')"
                    :disabled="loading"
                    type="password"
                ></input-text>
                <label v-if="showRemember">
                    <input v-model="remember" type="checkbox">
                    <span>Remember me</span>
                </label>
                <button
                    :disabled="loading || !username || !password"
                    type="submit"
                    class="u-button u-button-primary u-submit"
                >
                    <span v-if="!loading" v-html="buttonText"></span>
                    <i v-else class="fa fa-spinner fa-spin" aria-hidden="true" ></i>
                </button>
                <div @click="showLogin=!showLogin">
                    <span v-if="showLogin && $state.settings.startupOptions.public_register">
                        <a class="u-link">Create an account</a>
                    </span>
                    <span v-else-if="!showLogin">
                        <a class="u-link">
                            <i class="fa fa-chevron-left"></i> I already have an account
                        </a>
                    </span>
                </div>
                <div v-html="footerText"></div>
            </form>
        </template>
    </startup-layout>
</template>

<template id="kiwibnc-admin">
    <div class="kiwibnc-admin">

        <div class="kiwi-appsettings-block" style="max-width:750px;">
            <h3>Bouncer <span v-if="apiLoading" style="float:right;font-size:0.8em;">Loading..</span></h3>

            <div class="kiwi-appsettings-section">
                <label class="u-checkbox-wrapper">
                    <span>Allow public user registrations </span>
                    <input type="checkbox" v-model="allowRegistrationsWrap">
                </label>
                <small>Note: This temporarily changes the setting. To make it permanent over bouncer restarts you must edit your bouncers config file.</small>

                <h4>Restart the bouncer</h4>
                Restarting will restart all worker processes, reloading any extensions and configuration. No IRC connections will be disconnected.
                <br />
                <button :disabled="apiLoading" @click.prevent="restartBouncer" class="u-button u-button-secondary">
                    {{ isRestarting ? 'Restarting..' : 'Restart' }}
                </button>
            </div>
        </div>

        <div class="kiwi-appsettings-block" style="max-width:750px;">
            <h3>Users</h3>

            <div class="kiwi-appsettings-section">
                <a class="u-link" @click="refreshData" style="float:left;" >Refresh userlist</a>
                <a class="u-link" @click="adduser.visible=true" style="float:right;" >Add user</a>

                <form v-if="adduser.visible" class="kiwibnc-adduser" @submit.prevent="addUserSave">
                    <div v-if="adduser.error" class="kiwibnc-error">
                        {{ adduser.error }}
                    </div>
                    <input-text v-focus v-model="adduser.username" :label="'Username'"></input-text>
                    <input-text v-model="adduser.password" :label="'Password'"></input-text>
                    <label class="u-checkbox-wrapper">
                        <span>Admin </span>
                        <input type="checkbox" v-model="adduser.admin">
                    </label>

                    <div style="text-align:right;">
                        <button type="submit" class="u-button u-button-primary">Save</button>
                        <button @click="closeAddUser" class="u-button u-button-secondary">Cancel</button>
                    </div>
                </form>

                <div v-if="usersLoading">Loading user list...</div>
                <table v-else style="clear:left;width:100%;">
                    <tr>
                        <th>Username</th>
                        <th>Created</th>\
                        <th>Num. Networks</th>
                        <th></th>
                        <th></th>
                    </tr>
                    <template v-for="user in users" :key="user.id">
                    <tr style="border-bottom:1px solid rgba(0,0,0,0.2);">
                        <td>{{user.username}}</td>
                        <td>{{ new Date(user.created_at * 1000).toLocaleString()}}</td>
                        <td>{{user.num_networks || 0}}</td>
                        <td>{{user.admin ? 'Admin' : ''}} {{user.locked ? 'Locked' : ''}}</td>
                        <td><a class="u-link" @click="editingUserId=user.id">Edit <i class="fa fa-cog"></i></a></td>
                    </tr>
                    <tr v-if="editingUserId === user.id">
                        <td colspan="5">
                            <button v-if="user.locked" @click.prevent="unlockUser(user)" class="u-button u-button-secondary">Unlock</button>
                            <button v-else @click.prevent="lockUser(user)" class="u-button u-button-secondary">Lock</button>

                            <button @click.prevent="showEditPassword=true" class="u-button u-button-secondary">Change password</button>
                            <button @click.prevent="deleteUser(user)" class="u-button u-button-secondary" style="float:right;color:red;">Delete user</button>

                            <div v-if="showEditPassword">
                                <input-text v-focus v-model="newPassword" :label="'New password'"></input-text>
                                <button :disabled="!newPassword.trim()" @click.prevent="changePass(user);newPassword='';showEditPassword=false;" class="u-button u-button-primary">Save</button>
                                <button @click.prevent="newPassword='';showEditPassword=false;" class="u-button u-button-secondary">Cancel</button>
                            </div>
                        </td>
                    </tr>
                    </template>
                </table>
            </div>
        </div>
    </div>
</template>

<script>
    /* global _ */
    kiwi.plugin('kiwibnc', function(kiwi, log) {
        const basePath = kiwi.state.settings.plugins.find(p => p.name === 'kiwibnc').basePath;
        const InputText = kiwi.require('components/utils/InputText');
        const StartupLayout = kiwi.require('components/startups/CommonLayout');
        const BouncerProvider = kiwi.require('libs/BouncerProvider');
        const Misc = kiwi.require('helpers/Misc');

        let adminToken = '';
        const bouncerSyncState = {
            listenerAttached: false,
            knownBuffers: new Map(),
            // Track which networks have completed their initial buffer sync
            // so we can block bufferSeen() calls until lastSeen is restored
            syncedNetworks: new Set(),
            // Pending unread counts captured from raw BOUNCER lines before the middleware
            // strips the unread= tag. Key: `${netId}/${bufferName}`, value: number.
            pendingUnread: new Map(),
            // Pending per-buffer settings captured from raw BOUNCER lines before the
            // middleware strips the kiwi.settings= tag. Key: `${netId}/${bufferName}`,
            // value: parsed settings object.
            pendingSettings: new Map(),
            // Snapshot of the last per-buffer settings synced to the BNC, used to detect
            // real changes and to suppress echoing settings we just received.
            // Key: `${netId}/${bufferName}`, value: JSON string of synced settings.
            settingsSnapshot: new Map(),
            // Whether the buffer-settings change watcher has been installed
            settingsWatcherAttached: false,
        };

        // Per-buffer settings NOT synced through the generic kiwi.settings blob because
        // they already have a dedicated BOUNCER channel (alert_on <-> notify) that the
        // bouncer itself consumes for notification decisions.
        const NON_SYNCED_BUFFER_SETTINGS = ['alert_on'];

        // Minimal IRC tag decoder (key=value;key=value format used in BOUNCER params).
        function decodeIrcTags(str) {
            let tags = {};
            if (!str) return tags;
            str.split(';').forEach((pair) => {
                let idx = pair.indexOf('=');
                if (idx === -1) {
                    tags[pair] = true;
                } else {
                    tags[pair.slice(0, idx)] = pair.slice(idx + 1);
                }
            });
            return tags;
        }

        // decodeIrcTags splits on ; and = but does not unescape values. Apply the
        // IRCv3 message-tag value unescaping so we can JSON.parse the settings blob.
        function unescapeTagValue(val) {
            let s = String(val);
            let out = '';
            for (let i = 0; i < s.length; i++) {
                if (s[i] === '\\' && i + 1 < s.length) {
                    let c = s[++i];
                    if (c === ':') out += ';';
                    else if (c === 's') out += ' ';
                    else if (c === 'n') out += '\n';
                    else if (c === 'r') out += '\r';
                    else if (c === '\\') out += '\\';
                    else out += c;
                } else if (s[i] !== '\\') {
                    out += s[i];
                }
                // a lone trailing backslash is dropped, per spec
            }
            return out;
        }

        function escapeTagValue(val) {
            return String(val)
                .replace(/\\/g, '\\\\')
                .replace(/;/g, '\\:')
                .replace(/ /g, '\\s')
                .replace(/\r/g, '\\r')
                .replace(/\n/g, '\\n');
        }

        function isSafeSettingKey(key) {
            return key !== '__proto__' && key !== 'constructor' && key !== 'prototype';
        }

        // The subset of a buffer's setting overrides that should be synced to the BNC
        function syncableBufferSettings(bufferState) {
            let out = {};
            let settings = (bufferState && bufferState.settings) || {};
            Object.keys(settings).forEach((key) => {
                // undefined = an override that was cleared (falls back to global); it
                // must not appear here, matching what JSON.stringify would drop.
                if (settings[key] === undefined) {
                    return;
                }
                if (NON_SYNCED_BUFFER_SETTINGS.indexOf(key) === -1 && isSafeSettingKey(key)) {
                    out[key] = settings[key];
                }
            });
            return out;
        }

        // Attach bouncer buffer listener immediately to catch early LISTBUFFERS events
        // (before MOTD, during registration)
        function attachBouncerListener() {
            if (bouncerSyncState.listenerAttached) {
                return;
            }

            bouncerSyncState.listenerAttached = true;

            // Capture the unread= tag from raw BOUNCER listbuffers lines before
            // BouncerMiddleware whitelists the tags and strips unknown keys.
            // rawEventsHandler fires before bouncerMiddleware in the middleware chain,
            // so this runs while params[2] still contains the full tag string.
            kiwi.on('irc.raw.BOUNCER', (command, event) => {
                const params = event && event.params;
                if (!params || params[0] !== 'listbuffers') return;
                const tagStr = params[2];
                if (!tagStr || tagStr === 'RPL_OK' || tagStr === 'end') return;
                const tags = decodeIrcTags(tagStr);
                const netId = String(params[1] || '');
                const bufferName = String(tags.buffer || '');
                if (!netId || !bufferName) return;
                const pendingKey = `${netId}/${bufferName}`;

                if (tags.unread !== undefined) {
                    const unread = parseInt(tags.unread, 10);
                    bouncerSyncState.pendingUnread.set(pendingKey, isNaN(unread) ? 0 : unread);
                }

                if (tags['kiwi.settings'] !== undefined) {
                    try {
                        const parsed = JSON.parse(unescapeTagValue(tags['kiwi.settings']));
                        if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
                            bouncerSyncState.pendingSettings.set(pendingKey, parsed);
                        }
                    } catch (err) {
                        log.debug('kiwibnc: ignoring malformed kiwi.settings blob', err.message);
                    }
                }
            });

            kiwi.on('irc.bouncer buffers', (buffers, network) => {
                handleBouncerBuffers(buffers, network);
            });
        }

        function netStateKey(network, netId) {
            return `${String(network.id)}:${String(netId || '')}`;
        }

        function findBuffer(network, bufferName) {
            if (!network || !bufferName) {
                return null;
            }

            if (_.isFunction(network.bufferByName)) {
                return network.bufferByName(bufferName) || null;
            }

            return null;
        }

        function ensureBufferOpen(network, bufferName) {
            if (!network || !bufferName) {
                return;
            }
            if (findBuffer(network, bufferName)) {
                return;
            }

            try {
                if (kiwi.state && _.isFunction(kiwi.state.addBuffer)) {
                    kiwi.state.addBuffer(network.id, bufferName);
                }
            } catch (err) {
                log.debug('kiwibnc fallback: unable to open buffer', bufferName, err.message);
            }
        }

        function ensureBufferClosed(network, bufferName) {
            if (!network || !bufferName) {
                return;
            }

            const buffer = findBuffer(network, bufferName);
            if (!buffer) {
                return;
            }

            try {
                if (kiwi.state && _.isFunction(kiwi.state.removeBuffer)) {
                    kiwi.state.removeBuffer(buffer);
                }
            } catch (err) {
                log.debug('kiwibnc fallback: unable to close buffer', bufferName, err.message);
            }
        }

        function handleBouncerBuffers(buffers, network) {
            if (!network) {
                return;
            }

            const detectedNetId = _.get(buffers, '[0].networkId', '');
            const netId = String(detectedNetId || _.get(network, 'connection.bncnetid', ''));
            if (!netId) {
                return;
            }

            const key = netStateKey(network, netId);
            const isInitialSync = !bouncerSyncState.syncedNetworks.has(netId);
            const next = new Set();
            (buffers || []).forEach((bufferInfo) => {
                const bufferName = String(_.get(bufferInfo, 'name', ''));
                if (!bufferName) {
                    return;
                }

                next.add(bufferName);
                ensureBufferOpen(network, bufferName);

                const bufferState = findBuffer(network, bufferName);
                if (!bufferState) {
                    return;
                }

                if (bufferInfo.topic) {
                    bufferState.topic = bufferInfo.topic;
                }

                if (_.has(bufferInfo, 'joined')) {
                    // Parse joined explicitly: '1' = true, '0' = false
                    // (truthy coercion would treat '0' string as true)
                    bufferState.joined = bufferInfo.joined === '1' || bufferInfo.joined === 1 || bufferInfo.joined === true;
                    bufferState.enabled = bufferState.joined;
                }

                // A propagated listbuffers carries the state of EVERY buffer, but only
                // the one that triggered the propagation actually changed. We must avoid
                // overwriting unread counts on unchanged buffers, otherwise we clobber
                // counts that the client has been incrementing locally via addMessage.
                // Heuristic: only apply server state when `seen` has actually moved forward
                // (i.e. someone read this buffer on another device), or on the first sync
                // after reload (when local state is empty).
                const newSeenTs = bufferInfo.seen ? Date.parse(bufferInfo.seen) : 0;
                const seenAdvanced = Number.isFinite(newSeenTs) && newSeenTs > (bufferState.last_read || 0);
                const pendingKey = `${netId}/${bufferName}`;

                if (isInitialSync || seenAdvanced) {
                    if (Number.isFinite(newSeenTs) && newSeenTs > 0) {
                        bufferState.last_read = newSeenTs;
                    }
                    // Apply server-computed unread count. Skip if buffer is currently
                    // visible (it resets its own unread to 0 on focus).
                    if (!bufferState.flag('is_visible')) {
                        const unread = bouncerSyncState.pendingUnread.get(pendingKey);
                        if (unread !== undefined) {
                            bufferState.flag('unread', unread);
                        }
                    }
                }
                bouncerSyncState.pendingUnread.delete(pendingKey);

                if (bufferInfo.notify && _.isFunction(bufferState.setting)) {
                    bufferState.setting('alert_on', bufferInfo.notify);
                }

                // Reconcile per-buffer settings against the BNC. incomingSettings is the
                // server's COMPLETE syncable set for this buffer ({} when it sent no
                // kiwi.settings tag, i.e. it has none stored).
                const settingsKey = `${netId}/${bufferName}`;
                const incomingSettings = bouncerSyncState.pendingSettings.get(settingsKey) || {};
                bouncerSyncState.pendingSettings.delete(settingsKey);

                if (_.isFunction(bufferState.setting)) {
                    const currentStr = JSON.stringify(syncableBufferSettings(bufferState));
                    const snap = bouncerSyncState.settingsSnapshot.get(settingsKey);
                    // If there's an un-pushed local change for this buffer, don't let a
                    // (frequent) listbuffers rebroadcast clobber it before our watcher
                    // pushes it up. The watcher will reconcile once it has been sent.
                    const hasLocalPendingChange = snap !== undefined && snap !== currentStr;

                    if (!hasLocalPendingChange) {
                        // Unset local overrides the server no longer has (propagates
                        // deletions). setting(key, undefined) is a no-op read, so delete
                        // the reactive key directly (BufferState.setting falls back to the
                        // global default once the key is gone).
                        Object.keys(syncableBufferSettings(bufferState)).forEach((key) => {
                            if (!Object.prototype.hasOwnProperty.call(incomingSettings, key)) {
                                kiwi.state.$delete(bufferState.settings, key);
                            }
                        });
                        // Apply the server's values
                        Object.keys(incomingSettings).forEach((key) => {
                            if (NON_SYNCED_BUFFER_SETTINGS.indexOf(key) === -1 && isSafeSettingKey(key)) {
                                bufferState.setting(key, incomingSettings[key]);
                            }
                        });
                        bouncerSyncState.settingsSnapshot.set(
                            settingsKey,
                            JSON.stringify(syncableBufferSettings(bufferState))
                        );
                    }
                }
            });

            const prev = bouncerSyncState.knownBuffers.get(key) || new Set();
            prev.forEach(bufferName => {
                if (!next.has(bufferName)) {
                    ensureBufferClosed(network, bufferName);
                }
            });
            bouncerSyncState.knownBuffers.set(key, next);

            // Mark this network as synced so bufferSeen calls are no longer blocked
            bouncerSyncState.syncedNetworks.add(netId);

            // Cancel any pending markAsRead timers that were started before we
            // had the real last_read from the bouncer, then re-arm them so that
            // bufferSeen is sent correctly when the user navigates away.
            network.buffers.forEach((bufferState) => {
                if (bufferState.active_timeout) {
                    clearTimeout(bufferState.active_timeout);
                    bufferState.active_timeout = null;
                    // Re-arm: now that syncedNetworks has the netId,
                    // the gated bufferSeen will let calls through.
                    if (_.isFunction(bufferState.markAsRead)) {
                        bufferState.markAsRead(true);
                    }
                }
            });
        }


        const startupScreen = {
            template: '#kiwibnc-startup',
            components: {
                StartupLayout,
            },
            data() {
                return {
                    errorMessage: '',
                    network: null,
                    loading: false,
                    showLogin: true,
                    username: '',
                    password: '',
                    remember: false,
                    tokenLogin: false,
                };
            },
            computed: {
                greetingText() {
                    if (!this.showLogin) {
                        return 'Create an account';
                    }

                    const greeting = this.$state.settings.startupOptions.greetingText;
                    return typeof greeting === 'string' ?
                        greeting :
                        // TODO translation
                        'new KiwiBNC Login';
                },
                footerText: function footerText() {
                    const footer = this.$state.settings.startupOptions.footerText;
                    return typeof footer === 'string' ?
                        footer :
                        '';
                },
                buttonText() {
                    if (this.loading) {
                        return '';
                    }

                    if (!this.showLogin) {
                        return 'Create my account';
                    }

                    const buttonText = this.$state.settings.startupOptions.buttonText;
                    return typeof buttonText === 'string' ?
                        buttonText :
                        // TODO translation
                        'Login';
                },
                showRemember() {
                    const options = this.$state.settings.startupOptions;
                    return this.showLogin && options.state_key && !options.hideRemember;
                },
            },
            created() {
                const connectOptions = this.connectOptions();
                const bouncer = new BouncerProvider(this.$state);
                bouncer.enable(
                    connectOptions.hostname,
                    connectOptions.port,
                    connectOptions.tls,
                    connectOptions.direct,
                    connectOptions.direct_path
                );
            },
            mounted() {
                const { username, token } = this.getLogin();
                if (username && token) {
                    this.username = username;
                    this.password = token;
                    this.remember = true;
                    this.tokenLogin = true;
                    this.startUp();
                }
            },
            methods: {
                onSubmit() {
                    if (this.showLogin) {
                        this.startUp();
                    } else {
                        this.createAccount();
                    }
                },
                startUp() {
                    this.loading = true;
                    this.errorMessage = '';

                    const options = Object.assign({}, this.$state.settings.startupOptions);
                    const connectOptions = this.connectOptions();
                    const net = this.network || this.$state.addNetwork('Network', this.username, {
                        server: connectOptions.hostname,
                        port: connectOptions.port,
                        tls: connectOptions.tls,
                        encoding: options.encoding,
                        direct: connectOptions.direct,
                        path: connectOptions.direct_path || '',
                        gecos: options.gecos,
                        username: this.username,
                    });

                    // Clear the server buffer in case it already existed and contains messages relating to
                    // the previous connection, such as errors. They are now redundant since this is a
                    // new connection.
                    net.serverBuffer().clearMessages();

                    net.connection.nick = this.username;
                    net.connection.password = `${this.username}:${this.password}`;
                    net.password = '';

                    this.network = net;

                    // auto login support
                    if (this.remember) {
                        this.$state.$once('irc.bouncer networks', this.requestUserToken);
                    } else {
                        const { username, token } = this.getLogin();
                        if (username || token) {
                            // Clear out potentially invalid tokens when logging in manually
                            this.$once('start', () => {
                                this.forgetLogin();
                            });
                        }
                    }

                    net.ircClient.connect();
                    const onRegistered = () => {
                        if (this.$refs.layout) {
                            this.$refs.layout.close();
                        }
                        net.ircClient.off('registered', onRegistered);
                        net.ircClient.off('close', onClosed);
                    };
                    const onClosed = () => {
                        this.loading = false;

                        if (this.password.indexOf('__t1') === 0) {
                            // Connect failed, clear out the auto login token to force the user
                            // to enter a real password.
                            this.password = '';
                            this.remember = false;
                            this.tokenLogin = false;

                            // This was an auto login so the token has either expired or removed.
                            this.errorMessage = '';
                        } else {
                            this.errorMessage = net.last_error ||
                                Misc.networkErrorMessage(net.state_error);
                        }

                        this.$state.$off('irc.bouncer networks', this.requestUserToken);
                        net.ircClient.off('registered', onRegistered);
                        net.ircClient.off('close', onClosed);

                        if (this.$refs.password) {
                            this.$refs.password.$el.querySelector('input').select();
                        }
                    };
                    net.ircClient.once('registered', onRegistered);
                    net.ircClient.once('close', onClosed);
                },
                createAccount() {
                    this.loading = true;
                    this.errorMessage = '';

                    const data = new FormData();
                    data.append('username', this.username);
                    data.append('password', this.password);

                    fetch('/api/register', {
                        method: 'POST',
                        body: data,
                    })
                        .then((res) => res.json())
                        .then((resp) => {
                            this.loading = false;

                            if (resp.error) {
                                this.errorMessage = this.friendlyErrorMessage(resp.error);
                                return;
                            }

                            this.remember = false;
                            this.startUp();
                        })
                        // eslint-disable-next-line handle-callback-err
                        .catch((err) => {
                            this.errorMessage = this.friendlyErrorMessage('unknown_error');
                            this.loading = false;
                        });
                },
                friendlyErrorMessage(errCode) {
                    const errs = {
                        missing_params: 'All options are required',
                        username_in_use: 'Unavailable username',
                        invalid_username: 'Invalid username. Use only letters and numbers',
                        forbidden: 'Registrations are not allowed on this server',
                        unknown_error: 'An unknown error happened :(',
                    };

                    return errs[errCode] || errs.unknown_error;
                },
                connectOptions() {
                    const options = Object.assign({}, this.$state.settings.startupOptions);
                    const connectOptions = Misc.connectionInfoFromConfig(options);

                    // If a server isn't specified in the config, set some defaults
                    // The webircgateway will have a default network set and will connect
                    // there instead. This just removes the requirement of specifying the same
                    // irc network address in both the server-side and client side configs
                    connectOptions.hostname = connectOptions.hostname || 'default';
                    if (!connectOptions.port && connectOptions.direct) {
                        connectOptions.port = connectOptions.tls ?
                            443 :
                            80;
                    } else if (!connectOptions.port && !connectOptions.direct) {
                        connectOptions.port = connectOptions.tls ?
                            6697 :
                            6667;
                    }

                    return connectOptions;
                },
                requestUserToken(event, network) {
                    if (!network.is_bnc || network.connection.bncnetid) {
                        return;
                    }

                    if (this.tokenLogin) {
                        // Authed using a token, extend its expiration a further 7days
                        network.ircClient.say('*bnc', `changetoken ${this.password} 7d`);
                    } else {
                        // Create a new auth token so we can auto login next time the page is opened
                        this.$state.$on('irc.message', this.receiveUserToken);
                        network.ircClient.say('*bnc', 'addtoken 7d webchat');
                    }
                },
                receiveUserToken(event, network) {
                    if (event.nick !== '*bnc') {
                        return;
                    }
                    if (!event.tags['+auth_token']) {
                        return;
                    }

                    const token = event.tags['+auth_token'];
                    // State peristance is not currently ready. set our username/token when it is
                    // start is emitted from CommonLayout.vue
                    this.$once('start', () => {
                        this.rememberLogin(network.nick, token);
                    });
                    this.$state.$off('irc.message', this.receiveUserToken);
                },
                getLogin() {
                    const { username, token } = this.$state.setting('auto_login') || {};
                    return {
                        username,
                        token,
                    };
                },
                rememberLogin(username, token) {
                    this.$state.setting('auto_login', { username, token });
                },
                forgetLogin(username, token) {
                    this.$state.setting('auto_login', null);
                },
            },
        };

        let AdminScreen = {
            template: '#kiwibnc-admin',
            data: function() {
                return {
                    usersLoading: false,
                    users: [],
                    editingUserId: 0,
                    showEditPassword: false,
                    newPassword: '',
                    apiLoading: false,
                    isRestarting: false,
                    workerLastStarted: 0,
                    allowRegistrations: false,
                    adduser: {
                        visible: false,
                        error: '',
                        username: '',
                        password: '',
                        admin: false,
                    },
                };
            },
            created() {
                this.refreshData();
            },
            computed: {
                allowRegistrationsWrap: {
                    get() {
                        return this.allowRegistrations;
                    },
                    set(newVal) {
                        let oldVal = this.allowRegistrations;
                        this.apiCall('/admin/info', {
                            allowregistrations: newVal,
                        })
                        .then(resp => {
                            if (!resp.error) {
                                this.allowRegistrations = newVal;
                            }
                        });
                    },
                },
            },
            methods: {
                apiCall(path, data) {
                    let opts = {
                        headers: new Headers({ 'x-auth': adminToken }),
                    };
                    if (data) {
                        opts.method = 'POST';
                        opts.body = new FormData();
                        for (let prop in data) {
                            opts.body.append(prop, data[prop]);
                        }
                    }
                    this.apiLoading = true;
                    return fetch(basePath + '/api' + path, opts)
                    .then(resp => {
                        this.apiLoading = false;
                        return resp.json();
                    });
                },
                refreshData() {
                    this.apiCall('/admin/info')
                    .then(resp => {
                        this.users = {};
                        resp.users.forEach(u => {
                            this.users[u.id] = u;
                        });
                        this.allowRegistrations = resp.allowRegistrations;
                        this.workerLastStarted = resp.started;
                    });
                },
                addUserSave() {
                    this.apiCall('/admin/users', {
                        act: 'newuser',
                        username: this.adduser.username,
                        password: this.adduser.password,
                        admin: this.adduser.admin,
                    }).then(resp => {
                        if (resp.error) {
                            if (resp.error === 'missing_params') {
                                this.adduser.error = 'You must provide both a username and password!';
                            } else if (resp.error === 'user_exists') {
                                this.adduser.error = 'That username is unavailable';
                            } else {
                                this.adduser.error = `Unknown error (${resp.error})`;
                            }
                        } else {
                            this.closeAddUser();
                            this.refreshData();
                        }
                    });
                },
                closeAddUser() {
                    this.adduser.error = '';
                    this.adduser.username = '';
                    this.adduser.password = '';
                    this.adduser.admin = false;
                    this.adduser.visible = false;
                },
                lockUser(user) {
                    this.apiCall('/admin/users', {
                        act: 'lock',
                        username: user.username,
                    })
                    .then(resp => {
                        this.refreshData();
                    });
                },
                unlockUser(user) {
                    this.apiCall('/admin/users', {
                        act: 'unlock',
                        username: user.username,
                    })
                    .then(resp => {
                        this.refreshData();
                    });
                },
                changePass(user) {
                    this.apiCall('/admin/users', {
                        act: 'changepass',
                        username: user.username,
                        password: this.newPassword,
                    })
                    .then(resp => {
                        this.refreshData();
                    });
                },
                deleteUser(user) {
                    if (!confirm(`Supprimer définitivement l'utilisateur "${user.username}" ainsi que tous ses networks et ses logs ?`)) {
                        return;
                    }
                    this.apiCall('/admin/users', {
                        act: 'deleteuser',
                        username: user.username,
                    }).then(resp => {
                        if (resp.error === 'cannot_delete_self') {
                            alert('Vous ne pouvez pas supprimer votre propre compte.');
                        } else if (resp.error) {
                            alert(`Erreur : ${resp.error}`);
                        } else {
                            this.editingUserId = null;
                            this.refreshData();
                        }
                    });
                },
                restartBouncer() {
                    this.isRestarting = true;

                    this.apiCall('/admin/restart', {})
                    .then(() => {
                        // Check each second if it's back up yet
                        this.apiLoading = true;
                        let check = () => {
                            this.apiCall('/admin/info')
                            .then(resp => {
                                // If resp.started hasn't changed since the last time we refreshed
                                // data then the server hasn't restarted yet. It could be slow at
                                // shutting down for some reason.
                                if (resp.started === this.workerLastStarted) {
                                    throw new Error('not restarted');
                                }

                                this.isRestarting = false;
                                this.refreshData();
                            })
                            .catch(() => {
                                setTimeout(check, 1000);
                            });
                        };

                        setTimeout(check, 2000);
                    });
                },
            },
        };

        kiwi.addStartup('kiwibnc', startupScreen);

        // Track networks reported as connected by the BNC to handle race conditions
        // (where BNC reports connection before KiwiIRC creates the network object)
        const connectedBncNetworks = new Set();

        function autoConnectIfReady(network) {
            if (!network.connection || !network.connection.bncnetid) {
                return;
            }

            if (connectedBncNetworks.has(network.connection.bncnetid.toString())) {
                if (network.state === 'disconnected') {
                    network.ircClient.connect();
                }
            }
        }

        // Handle BOUNCER state events to auto-connect networks
        kiwi.on('irc.bouncer state', function(event, network) {
            if (event.state === 'connected') {
                connectedBncNetworks.add(event.networkId.toString());

                // Find the network in KiwiIRC that corresponds to this BNC network ID
                let targetNet = kiwi.state.networks.find(n =>
                    n.connection && n.connection.bncnetid == event.networkId
                );

                // If found and currently disconnected, connect it
                if (targetNet && targetNet.state === 'disconnected') {
                    targetNet.ircClient.connect();
                }
            } else {
                connectedBncNetworks.delete(event.networkId.toString());
            }
        });

        // When new networks are created, ensure bouncer cap is requested before
        // any connect. kiwi.on() fires before BouncerProvider's state.$on(), so
        // without this the cap would be missing if autoConnectIfReady triggers connect.
        kiwi.on('network.new', (event) => {
            event.network.ircClient.requestCap('bouncer');
            autoConnectIfReady(event.network);

            // On disconnect, clear sync state so the next listbuffers after
            // reconnect is treated as an initial sync (applies server unread
            // values even when seen hasn't advanced). Without this, counts
            // accumulated locally would shadow authoritative server values.
            event.network.ircClient.on('socket close', () => {
                const netId = String(_.get(event.network, 'connection.bncnetid', ''));
                if (!netId) return;
                bouncerSyncState.syncedNetworks.delete(netId);
                bouncerSyncState.pendingUnread.forEach((_, key) => {
                    if (key.startsWith(netId + '/')) {
                        bouncerSyncState.pendingUnread.delete(key);
                    }
                });
                bouncerSyncState.pendingSettings.forEach((_, key) => {
                    if (key.startsWith(netId + '/')) {
                        bouncerSyncState.pendingSettings.delete(key);
                    }
                });
                // Drop snapshots for this network; the next initial sync repopulates
                // them (and the push gate above blocks pushes until then).
                bouncerSyncState.settingsSnapshot.forEach((_, key) => {
                    if (key.startsWith(netId + '/')) {
                        bouncerSyncState.settingsSnapshot.delete(key);
                    }
                });
            });
        });

        // Gate bufferSeen calls: block them until the initial bouncer buffer sync
        // has completed and restored the real last_read values. Without this,
        // markAsRead() fires seen=1 (= now) before the bouncer has told us the
        // real seen timestamp, which resets unread counts on every page reload.
        //
        // We patch bufferSeen in the irc.motd handler below — at that point
        // BouncerMiddleware has already installed bnc on the ircClient.
        const patchedClients = new WeakSet();
        function patchBufferSeen(network) {
            const client = network.ircClient;
            if (!client || patchedClients.has(client)) {
                return;
            }
            if (!client.bnc || !client.bnc.bufferSeen) {
                return;
            }

            patchedClients.add(client);
            const origBufferSeen = client.bnc.bufferSeen;
            client.bnc.bufferSeen = function gatedBufferSeen(netId, bufferName, seenTime) {
                if (!bouncerSyncState.syncedNetworks.has(String(netId))) {
                    return;
                }
                return origBufferSeen.call(this, netId, bufferName, seenTime);
            };
        }

        let adminAdded = false;
        kiwi.on('irc.motd', function(event, network) {
            patchBufferSeen(network);
            // kiwibnc admin users get a kiwibnc/admin=token ISUPPORTs token added. The token
            // is used for the HTTP admin interface for auth
            let token = network.ircClient.network.supports('kiwibnc/admin');
            if (token && !adminAdded) {
                adminAdded = true;
                adminToken = token;
                kiwi.addTab('settings', 'KiwiBNC Admin', AdminScreen);
            }

            // Restore the account-level KiwiIRC settings blob from the BNC (survives
            // localStorage being wiped, e.g. Edge clearing site data on close).
            loadUserConfig(network);

            // Sync bouncer buffers at MOTD (like KiwiIRC native BouncerProvider)
            // The BouncerMiddleware adds bnc.tags() method to decode the bouncer CAP token
            if (network.ircClient.bnc && network.ircClient.bnc.hasNetwork()) {
                let netId = network.ircClient.bnc.tags().netid;
                if (netId) {
                    network.connection.bncnetid = netId;
                    // Request buffer list from bouncer - listener will handle the response
                    network.ircClient.raw('BOUNCER listbuffers ' + netId);
                }
            }
        });

        // --- Account-level KiwiIRC settings (user_settings) persistence ---------------
        // Mirrors the per-buffer sync in spirit (snapshot anti-echo + init gate) but the
        // whole user_settings blob can exceed an IRC line (aliases), so it rides HTTP
        // instead of the BOUNCER protocol. Auth via the kiwibnc/clientconfig ISUPPORT token.
        const userConfigState = {
            token: '',
            loaded: false,        // initial GET applied
            snapshot: null,       // JSON string last synced to the BNC
            watcherAttached: false,
        };

        function putUserConfig(settingsObj) {
            if (!userConfigState.token) {
                return;
            }
            fetch(basePath + '/api/clientconfig', {
                method: 'PUT',
                headers: new Headers({
                    'x-auth': userConfigState.token,
                    'content-type': 'application/json',
                }),
                body: JSON.stringify({ settings: settingsObj || {} }),
            }).catch((err) => {
                log.debug('kiwibnc: failed to save client config', err && err.message);
            });
        }

        function loadUserConfig(network) {
            if (userConfigState.loaded) {
                return;
            }
            const token = network.ircClient.network.supports('kiwibnc/clientconfig');
            if (!token) {
                return;
            }
            userConfigState.token = token;

            fetch(basePath + '/api/clientconfig', { headers: new Headers({ 'x-auth': token }) })
                .then((resp) => resp.json())
                .then((resp) => {
                    const serverSettings = (resp && resp.settings && typeof resp.settings === 'object' && !Array.isArray(resp.settings)) ?
                        resp.settings : {};
                    const localSettings = kiwi.state.user_settings || {};
                    const serverEmpty = Object.keys(serverSettings).length === 0;
                    const localNonEmpty = Object.keys(localSettings).length > 0;

                    if (serverEmpty && localNonEmpty) {
                        // First connect for this account: migrate the existing local
                        // settings up to the BNC instead of wiping them with an empty blob.
                        userConfigState.snapshot = JSON.stringify(localSettings);
                        putUserConfig(localSettings);
                    } else {
                        // Server is authoritative: apply its blob. Passing only user_settings
                        // (no networks key) means importState does NOT reset networks/buffers.
                        kiwi.state.importState(JSON.stringify({ user_settings: serverSettings }));
                        userConfigState.snapshot = JSON.stringify(kiwi.state.user_settings || {});
                    }
                    userConfigState.loaded = true;
                })
                .catch((err) => {
                    log.debug('kiwibnc: failed to load client config', err && err.message);
                });
        }

        // Push local user_settings changes up to the BNC (debounced, snapshot-gated).
        function attachUserSettingsWatcher() {
            if (userConfigState.watcherAttached) {
                return;
            }
            if (!kiwi.state || !_.isFunction(kiwi.state.$watch)) {
                return;
            }
            userConfigState.watcherAttached = true;

            const pushConfig = _.debounce(() => {
                // Don't push until the initial GET has been applied, otherwise startup
                // local state could overwrite the BNC's stored blob.
                if (!userConfigState.loaded) {
                    return;
                }
                const currentStr = JSON.stringify(kiwi.state.user_settings || {});
                if (currentStr === userConfigState.snapshot) {
                    return;
                }
                userConfigState.snapshot = currentStr;
                putUserConfig(kiwi.state.user_settings || {});
            }, 2000);

            kiwi.state.$watch('user_settings', pushConfig, { deep: true });
        }

        // Push local per-buffer setting changes to the BNC so they persist and sync
        // across the user's other connected clients. This is the write side of the
        // read path in handleBouncerBuffers().
        function attachBufferSettingsWatcher() {
            if (bouncerSyncState.settingsWatcherAttached) {
                return;
            }
            if (!kiwi.state || !_.isFunction(kiwi.state.$watch)) {
                return;
            }
            bouncerSyncState.settingsWatcherAttached = true;

            const pushChanges = _.debounce(() => {
                kiwi.state.networks.forEach((network) => {
                    const netId = String(_.get(network, 'connection.bncnetid', ''));
                    if (!netId) {
                        return;
                    }
                    // Don't push until the initial buffer sync has restored the real
                    // server-side settings, otherwise stale local state could overwrite
                    // the BNC's stored values on startup.
                    if (!bouncerSyncState.syncedNetworks.has(netId)) {
                        return;
                    }
                    const client = network.ircClient;
                    if (!client || !_.isFunction(client.raw)) {
                        return;
                    }

                    network.buffers.forEach((bufferState) => {
                        const bufferName = bufferState.name;
                        if (!bufferName) {
                            return;
                        }
                        // Only channels and queries have server-side buffers to update
                        if (_.isFunction(bufferState.isChannel) && _.isFunction(bufferState.isQuery) &&
                            !bufferState.isChannel() && !bufferState.isQuery()) {
                            return;
                        }

                        const key = `${netId}/${bufferName}`;
                        const currentStr = JSON.stringify(syncableBufferSettings(bufferState));

                        if (bouncerSyncState.settingsSnapshot.get(key) === currentStr) {
                            return;
                        }

                        const known = bouncerSyncState.settingsSnapshot.has(key);
                        bouncerSyncState.settingsSnapshot.set(key, currentStr);

                        // Nothing meaningful to push for a new buffer with no overrides
                        if (!known && currentStr === '{}') {
                            return;
                        }

                        client.raw(`BOUNCER changebuffer ${netId} ${bufferName} kiwi.settings=${escapeTagValue(currentStr)}`);
                    });
                });
            }, 2000);

            // Recompute a fingerprint of every buffer's syncable settings; the watcher
            // fires (and debounce-pushes) only when that fingerprint actually changes.
            kiwi.state.$watch(() => {
                let vals = [];
                kiwi.state.networks.forEach((network) => {
                    const netId = _.get(network, 'connection.bncnetid', '');
                    if (!netId) {
                        return;
                    }
                    network.buffers.forEach((bufferState) => {
                        vals.push(`${netId}/${bufferState.name}=${JSON.stringify(syncableBufferSettings(bufferState))}`);
                    });
                });
                return vals.join('\n');
            }, pushChanges);
        }

        // Attach listener immediately on plugin load
        attachBouncerListener();
        attachBufferSettingsWatcher();
        attachUserSettingsWatcher();
    });
</script>
